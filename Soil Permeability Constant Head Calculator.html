<div class="geo-calc-box">
    <h3 class="geo-title">🧪 Constant Head Permeability Calculator</h3>
    <div class="geo-row">
        <label>Total Discharged Water Volume (Q) — cm³</label>
        <input type="number" id="k-q" value="450" step="any">
    </div>
    <div class="geo-row">
        <label>Length of Soil Specimen (L) — cm</label>
        <input type="number" id="k-l" value="15" step="any">
    </div>
    <div class="geo-row">
        <label>Cross-Sectional Area (A) — cm²</label>
        <input type="number" id="k-a" value="75" step="any">
    </div>
    <div class="geo-row">
        <label>Constant Head Difference (h) — cm</label>
        <input type="number" id="k-h" value="30" step="any">
    </div>
    <div class="geo-row">
        <label>Total Elapsed Time (t) — seconds</label>
        <input type="number" id="k-t" value="60" step="any">
    </div>
    <button type="button" class="geo-btn" onclick="runPerm()">Compute Permeability</button>
    <div class="geo-results">
        <div style="font-size: 15px;">Permeability (k) = <span id="res-k" class="geo-val">0.0500</span> cm/sec</div>
    </div>
</div>

<script>
function runPerm() {
    var Q = parseFloat(document.getElementById('k-q').value) || 0;
    var L = parseFloat(document.getElementById('k-l').value) || 0;
    var A = parseFloat(document.getElementById('k-a').value) || 0;
    var h = parseFloat(document.getElementById('k-h').value) || 0;
    var t = parseFloat(document.getElementById('k-t').value) || 0;

    if(A <= 0 || h <= 0 || t <= 0 || L <= 0) { alert("Dimensions, head, and time parameters must be greater than zero."); return; }

    var k = (Q * L) / (A * h * t);
    document.getElementById('res-k').innerText = k.toFixed(4);
}
</script>
