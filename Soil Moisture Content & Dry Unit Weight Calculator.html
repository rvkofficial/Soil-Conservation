<div class="geo-calc-box">
    <h3 class="geo-title">💧 Soil Moisture & Dry Density Calculator</h3>
    <div class="geo-row">
        <label>Mass of Wet Soil + Container (g)</label>
        <input type="number" id="m-wet" value="150" step="any">
    </div>
    <div class="geo-row">
        <label>Mass of Dry Soil + Container (g)</label>
        <input type="number" id="m-dry" value="130" step="any">
    </div>
    <div class="geo-row">
        <label>Mass of Empty Container (g)</label>
        <input type="number" id="m-jar" value="30" step="any">
    </div>
    <div class="geo-row">
        <label>Bulk Unit Weight (γ) — kN/m³</label>
        <input type="number" id="m-gamma" value="19.5" step="any">
    </div>
    <button type="button" class="geo-btn" onclick="runMoisture()">Compute Properties</button>
    <div class="geo-results">
        <div style="font-size:14px; margin-bottom:8px;">Moisture Content (w) = <span id="res-w" class="geo-val">20.00</span> %</div>
        <div style="font-size:14px; border-top:1px solid #dcd6d0; padding-top:8px;">Dry Unit Weight (γ_d) = <span id="res-gd" class="geo-val">16.25</span> kN/m³</div>
    </div>
</div>

<script>
function runMoisture() {
    var wet = parseFloat(document.getElementById('m-wet').value) || 0;
    var dry = parseFloat(document.getElementById('m-dry').value) || 0;
    var jar = parseFloat(document.getElementById('m-jar').value) || 0;
    var gamma = parseFloat(document.getElementById('m-gamma').value) || 0;

    var massWater = wet - dry;
    var massSolids = dry - jar;

    if(massSolids <= 0 || massWater < 0) { alert("Check input masses. Dry soil weight must be positive."); return; }

    var w = (massWater / massSolids) * 100;
    var gd = gamma / (1 + (w / 100));

    document.getElementById('res-w').innerText = w.toFixed(2);
    document.getElementById('res-gd').innerText = gd.toFixed(2);
}
</script>
